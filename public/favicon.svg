<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#0F2E3F"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1FCFB0"/>
      <stop offset="100%" stop-color="#0F9E75"/>
    </linearGradient>
    <linearGradient id="beakerFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1FCFB0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1FCFB0" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="none" stroke="rgba(31,207,176,0.22)" stroke-width="1.5"/>

  <!-- ── Bar chart (left) ── -->
  <line x1="6" y1="52" x2="30" y2="52" stroke="rgba(255,255,255,0.12)" stroke-width="1" stroke-linecap="round"/>
  <rect x="8"  y="40" width="6" height="12" rx="1.5" fill="rgba(31,207,176,0.22)"/>
  <rect x="17" y="30" width="6" height="22" rx="1.5" fill="rgba(31,207,176,0.42)"/>
  <rect x="26" y="18" width="6" height="34" rx="1.5" fill="url(#teal)"/>
  <polyline points="11,38 20,28 29,16" fill="none" stroke="#1FCFB0" stroke-width="1.8"
    stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="29" cy="16" r="2.5" fill="#1FCFB0"/>
  <circle cx="29" cy="16" r="1.1" fill="#fff"/>

  <!-- ── Beaker (right) ── -->
  <!-- Rim -->
  <rect x="37" y="10" width="20" height="5" rx="2" fill="rgba(31,207,176,0.2)" stroke="rgba(31,207,176,0.55)" stroke-width="1"/>
  <!-- Body -->
  <path d="M40,15 L34,50 Q33,54 37,54 L57,54 Q61,54 60,50 L54,15 Z"
    fill="url(#beakerFill)" stroke="rgba(31,207,176,0.55)" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Liquid -->
  <path d="M35,42 L34,50 Q33,54 37,54 L57,54 Q61,54 60,50 L59,42 Z"
    fill="rgba(31,207,176,0.55)"/>
  <!-- Wave -->
  <path d="M35,42 Q41,38 47,42 Q53,46 59,42"
    fill="none" stroke="#1FCFB0" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Bubbles in liquid -->
  <circle cx="40" cy="48" r="1.6" fill="rgba(255,255,255,0.35)"/>
  <circle cx="50" cy="46" r="1.1" fill="rgba(255,255,255,0.28)"/>
  <circle cx="55" cy="50" r="1.3" fill="rgba(255,255,255,0.28)"/>
  <!-- Rising bubbles -->
  <circle cx="43" cy="34" r="1.4" fill="none" stroke="rgba(31,207,176,0.5)" stroke-width="0.9"/>
  <circle cx="51" cy="26" r="1.1" fill="none" stroke="rgba(31,207,176,0.38)" stroke-width="0.8"/>
</svg>
