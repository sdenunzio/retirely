<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 140" width="420" height="140">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#0F2E3F"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1FCFB0"/>
      <stop offset="100%" stop-color="#0F9E75"/>
    </linearGradient>
    <linearGradient id="beakerFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1FCFB0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1FCFB0" stop-opacity="0.45"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Icon background -->
  <rect x="12" y="12" width="116" height="116" rx="22" fill="url(#bgGrad)"/>
  <rect x="12" y="12" width="116" height="116" rx="22" fill="none" stroke="rgba(31,207,176,0.18)" stroke-width="1.5"/>

  <!-- ── Bar chart (left half of icon) ── -->
  <line x1="26" y1="100" x2="72" y2="100" stroke="rgba(255,255,255,0.1)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="26" y1="100" x2="26" y2="32" stroke="rgba(255,255,255,0.1)" stroke-width="1.2" stroke-linecap="round"/>

  <rect x="30" y="76" width="10" height="24" rx="2" fill="rgba(31,207,176,0.22)"/>
  <rect x="44" y="60" width="10" height="40" rx="2" fill="rgba(31,207,176,0.4)"/>
  <rect x="58" y="42" width="10" height="58" rx="2" fill="url(#tealGrad)" filter="url(#glow)"/>

  <polyline points="35,74 49,58 63,40" fill="none" stroke="#1FCFB0" stroke-width="2.2"
    stroke-linecap="round" stroke-linejoin="round" filter="url(#softglow)"/>
  <circle cx="63" cy="40" r="3.5" fill="#1FCFB0" filter="url(#softglow)"/>
  <circle cx="63" cy="40" r="1.6" fill="#fff"/>

  <!-- ── Lab beaker (right half of icon) ── -->
  <!-- Beaker neck / rim -->
  <rect x="82" y="28" width="28" height="7" rx="3" fill="rgba(31,207,176,0.25)" stroke="rgba(31,207,176,0.5)" stroke-width="1.2"/>

  <!-- Beaker body — trapezoidal path -->
  <path d="M86,35 L78,95 Q77,100 83,100 L109,100 Q115,100 114,95 L106,35 Z"
    fill="url(#beakerFill)" stroke="rgba(31,207,176,0.55)" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Liquid fill inside beaker -->
  <path d="M79.5,82 L78,95 Q77,100 83,100 L109,100 Q115,100 114,95 L112.5,82 Z"
    fill="rgba(31,207,176,0.55)"/>

  <!-- Liquid surface wave -->
  <path d="M79.5,82 Q88,78 96,82 Q104,86 112.5,82"
    fill="none" stroke="#1FCFB0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Bubbles in liquid -->
  <circle cx="86" cy="91" r="2.2" fill="rgba(255,255,255,0.35)"/>
  <circle cx="98" cy="88" r="1.5" fill="rgba(255,255,255,0.25)"/>
  <circle cx="106" cy="93" r="1.8" fill="rgba(255,255,255,0.3)"/>

  <!-- Bubbles rising above liquid -->
  <circle cx="90" cy="70" r="2" fill="none" stroke="rgba(31,207,176,0.5)" stroke-width="1"/>
  <circle cx="101" cy="60" r="1.5" fill="none" stroke="rgba(31,207,176,0.4)" stroke-width="1"/>
  <circle cx="94" cy="52" r="1.2" fill="none" stroke="rgba(31,207,176,0.3)" stroke-width="0.8"/>

  <!-- Maple leaf tiny accent -->
  <g transform="translate(108, 20) scale(0.48)" opacity="0.6">
    <path d="M8,0 L9.5,4.5 L14,3 L11,7 L15,9 L10.5,9.5 L10.5,16 L5.5,16 L5.5,9.5 L1,9 L5,7 L2,3 L6.5,4.5 Z"
      fill="#1FCFB0"/>
  </g>

  <!-- ── Wordmark ── -->
  <text x="148" y="72" font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
    font-size="34" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">Retire</text>
  <text x="266" y="72" font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
    font-size="34" font-weight="700" fill="#1FCFB0" letter-spacing="-0.5">Plan</text>

  <!-- CA badge -->
  <rect x="343" y="42" width="28" height="16" rx="5" fill="rgba(31,207,176,0.15)" stroke="rgba(31,207,176,0.35)" stroke-width="1"/>
  <text x="357" y="54" font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
    font-size="10" font-weight="600" fill="#1FCFB0" text-anchor="middle" letter-spacing="0.5">CA</text>

  <!-- Tagline -->
  <text x="148" y="96" font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
    font-size="12.5" font-weight="400" fill="rgba(255,255,255,0.35)" letter-spacing="2.8">RETIREMENT LAB</text>

  <!-- Accent rule -->
  <line x1="148" y1="104" x2="378" y2="104" stroke="rgba(31,207,176,0.18)" stroke-width="1"/>
</svg>
